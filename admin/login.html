<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Sign In | Asera</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="./theme.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <script src="./config.js"></script>
    <script src="./theme.js"></script>
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #121212 0%, #1e1e1e 100%);
        }
        .auth-card {
            background: rgba(30, 30, 30, 0.75);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(212, 175, 55, 0.15);
            max-width: 420px;
            width: 100%;
            border-radius: 16px;
        }
        .text-gold {
            color: #d4af37 !important;
        }
        .btn-gold {
            background-color: #d4af37;
            border-color: #d4af37;
            color: #121212;
            transition: all 0.3s ease;
        }
        .btn-gold:hover {
            background-color: #f3e5ab;
            border-color: #f3e5ab;
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(212, 175, 55, 0.4);
        }
        .form-control {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: #fff;
        }
        .form-control:focus {
            background: rgba(255, 255, 255, 0.08);
            border-color: #d4af37;
            box-shadow: 0 0 0 0.25rem rgba(212, 175, 55, 0.25);
            color: #fff;
        }
        label {
            color: rgba(255, 255, 255, 0.7);
        }
    </style>
</head>

<body>

    <div class="container d-flex justify-content-center align-items-center">
        <div class="card shadow-lg auth-card overflow-hidden">

            <!-- Header -->
            <div class="p-4 text-center border-bottom border-secondary border-opacity-25"
                style="background: rgba(255,255,255,0.02);">
                <a href="login.html" class="text-decoration-none">
                    <img src="./img/1.png" alt="Asera Logo" height="65" class="mb-2">
                    <h3 class="fw-bold text-gold m-0">Asera Admin</h3>
                </a>
                <p class="text-muted small mb-0 mt-2">Authorized Personnel Access Only</p>
            </div>

            <div class="card-body p-4">
                <form id="adminLoginForm">
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Admin Email</label>
                        <div class="input-group">
                            <span class="input-group-text bg-transparent border-end-0 text-muted"><i class="bi bi-envelope"></i></span>
                            <input type="email" id="adminEmail" class="form-control border-start-0" placeholder="admin@asera.com" required>
                        </div>
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-semibold">Password</label>
                        <div class="input-group">
                            <span class="input-group-text bg-transparent border-end-0 text-muted"><i class="bi bi-lock"></i></span>
                            <input type="password" id="adminPassword" class="form-control border-start-0" placeholder="••••••••" required>
                        </div>
                    </div>
                    <div class="d-grid mb-2">
                        <button type="submit" class="btn btn-gold btn-lg fw-bold">Sign In to Console</button>
                    </div>
                </form>
            </div>
            
            <div class="text-center pb-4">
                <a href="login.html" class="text-gold text-decoration-none small"><i class="bi bi-arrow-left"></i> Refresh Console</a>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const API_URL = 'https://tool-api-ppe7.onrender.com';

        window.addEventListener('DOMContentLoaded', async () => {
            // Check session first
            try {
                const res = await fetch(`${API_URL}/api/auth/me`, { credentials: 'include' });
                if (res.ok) {
                    const data = await res.json();
                    if (data.isLoggedIn && (data.user.role === 'admin' || data.user.email === 'admin@asera.com')) {
                        // Already logged in as admin
                        window.location.href = 'index.html';
                        return;
                    }
                }
            } catch (err) {
                console.warn('Auth check failed:', err);
            }
        });

        document.getElementById('adminLoginForm').addEventListener('submit', async function (e) {
            e.preventDefault();
            const email = document.getElementById('adminEmail').value;
            const password = document.getElementById('adminPassword').value;

            try {
                const response = await fetch(`${API_URL}/api/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({ email, password })
                });
                const data = await response.json();

                if (response.ok && data.user) {
                    // Check if user is admin@asera.com or has admin role
                    if (data.user.email === 'admin@asera.com' || data.user.role === 'admin') {
                        // Save admin flag and redirect
                        localStorage.setItem('userEmail', data.user.email);
                        localStorage.setItem('userName', data.user.firstName);
                        localStorage.setItem('isAdmin', 'true');
                        window.location.href = 'index.html';
                    } else {
                        alert('Access denied. Admins only.');
                    }
                } else {
                    alert(data.message || 'Invalid admin credentials');
                }
            } catch (error) {
                console.error('Error:', error);
                alert('An error occurred during admin sign-in');
            }
        });
    </script>
</body>

</html>
